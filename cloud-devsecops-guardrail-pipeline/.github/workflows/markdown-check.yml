name: Markdown Structure Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Confirm key documentation exists
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f START_HERE.md
          test -f docs/PHONE_SETUP_GUIDE.md
          test -f docs/secdevops-pipeline-explained.md
          test -f reports/executive-summary.md
          test -f reports/remediation-plan.md
          test -f terraform/insecure/main.tf
          test -f terraform/secure/main.tf
